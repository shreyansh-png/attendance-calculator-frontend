<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your AttendEase password.">
    <title>Forgot Password | AttendEase</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="brand-logo">🔐</div>

            <h2>Reset Password</h2>

            <p>Enter your email address and choose a new password.</p>

            <form id="forgot-password-form">

                <div class="field-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your registered email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="field-group">
                    <label for="newPassword">New Password</label>
                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter new password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <div class="field-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm your new password"
                        required
                    >
                </div>

                <button type="submit" id="reset-btn">Reset Password</button>

            </form>

            <div class="bottom-text">
                <p>Remember your password? <a href="login.html">Back to Login</a></p>
            </div>

        </div>

    </div>

    <script src="toast.js"></script>
    <script src="api.js"></script>
    <script src="forgotpassword.js"></script>

</body>

</html>
