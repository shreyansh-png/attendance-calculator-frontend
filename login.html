<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to AttendEase — your smart attendance management system.">
    <title>Login | AttendEase</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="brand-logo"><i data-lucide="graduation-cap" style="width:48px;height:48px;"></i></div>

            <h2>Welcome Back</h2>

            <p>Login to manage your attendance & schedule.</p>

            <p class="form-hint">
                <i data-lucide="info" style="width:14px;height:14px;display:inline-block;vertical-align:middle;"></i> Verification Code = Last 2 digits of Roll No. + Branch<br>
                <strong>Example:</strong> 67ECE
            </p>

            <form id="login-form">

                <div class="field-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>

                <button type="submit" id="login-btn">Login</button>

            </form>

            <div class="bottom-text">
                <p>Don't have an account? <a href="register.html">Create Account</a></p>
                <p><a href="admin/admin-login.html">Admin Login</a></p>
            </div>

        </div>

    </div>

    <script src="toast.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
