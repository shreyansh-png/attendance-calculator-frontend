<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Attendance Report — Subject-wise attendance overview.">
    <title>Attendance | AttendEase</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="attendance.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<nav class="navbar">
    <div class="brand">
        <i data-lucide="graduation-cap"></i> AttendEase
    </div>
    <button onclick="window.location='dashboard.html'"><i data-lucide="arrow-left" style="width:14px;height:14px;margin-right:4px;"></i> Dashboard</button>
</nav>

<main class="attendance-page">

    <div class="page-header">
        <h1><i data-lucide="bar-chart-2"></i> Attendance Report</h1>
        <p>Your subject-wise and overall attendance summary.</p>
    </div>

    <div id="overallCard" class="overall-card">
        <div class="overall-info">
            <p class="overall-label">Overall Attendance</p>
            <h1 id="overallAttendance" class="skeleton skeleton-line short" style="height:48px;width:100px;">--</h1>
        </div>
        <div class="overall-icon"><i data-lucide="pie-chart"></i></div>
    </div>

    <div class="table-wrapper">
        <h2>Subject-wise Breakdown</h2>
        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>Total</th>
                    <th>Percentage</th>
                </tr>
            </thead>
            <tbody id="attendanceTable">
                <!-- Skeleton rows -->
                <tr class="skeleton-row">
                    <td><div class="skeleton skeleton-line medium"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                </tr>
                <tr class="skeleton-row">
                    <td><div class="skeleton skeleton-line medium"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                </tr>
                <tr class="skeleton-row">
                    <td><div class="skeleton skeleton-line full"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                    <td><div class="skeleton skeleton-line short"></div></td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<script src="toast.js"></script>
<script src="api.js"></script>
<script src="attendance.js"></script>
<script>
    lucide.createIcons();
</script>
</body>

</html>
