<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your AttendEase student account.">
    <title>Create Account | AttendEase</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .register-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 14px;
        }
        .register-grid .field-group {
            margin-bottom: 0;
        }
        .register-grid .field-group.full {
            grid-column: 1 / -1;
        }
        .login-card { max-width: 520px; }
        .login-card form { gap: 12px; }

        @media (max-width: 540px) {
            .register-grid { grid-template-columns: 1fr; }
        }
    </style>

</head>

<body>

<div class="login-container">

<div class="login-card">

    <div class="brand-logo"><i data-lucide="graduation-cap" style="width:48px;height:48px;"></i></div>

    <h2>Create Account</h2>

    <p>Join AttendEase and stay on top of your attendance.</p>

    <p class="form-hint">
        <i data-lucide="info" style="width:14px;height:14px;display:inline-block;vertical-align:middle;"></i> Verification Code = Last 2 digits of Roll No. + Branch (e.g. <strong>67ECE</strong>)
    </p>

    <form id="register-form">

    <div class="register-grid">

        <div class="field-group full">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="field-group">
            <label for="rollNo">Roll Number</label>
            <input type="text" id="rollNo" placeholder="e.g. 2500520310067" required>
        </div>

        <div class="field-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email" required autocomplete="email">
        </div>

        <div class="field-group">
            <label for="branch">Branch</label>
            <select id="branch" required>
                <option value="">Select Branch</option>
                <option value="ECE">ECE</option>
                <option value="CSE-R">CSE-R</option>
                <option value="CSE-AI">CSE-AI</option>
                <option value="CSE-SF">CSE-SF</option>
                <option value="CHE">CHE</option>
                <option value="EE">EE</option>
                <option value="ME">ME</option>
                <option value="CE">CE</option>
            </select>
        </div>

        <div class="field-group">
            <label for="semester">Semester</label>
            <select id="semester" required>
                <option value="">Select Semester</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>
        </div>

        <div class="field-group">
            <label for="section">Section</label>
            <select id="section" required>
                <option value="">Select Section</option>
                <option value="A">A</option>
                <option value="B">B</option>
            </select>
        </div>

        <div class="field-group">
            <label for="batch">Batch (Passing Year)</label>
            <input type="number" id="batch" placeholder="e.g. 2029" required>
        </div>

        <div class="field-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
        </div>

        <div class="field-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        </div>

    </div>

    <button type="submit" id="register-btn" style="margin-top: 8px;">Create Account</button>

    </form>

    <div class="bottom-text">
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

</div>

</div>

<script src="toast.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script>
    lucide.createIcons();
</script>

</body>

</html>
