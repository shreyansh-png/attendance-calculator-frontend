<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | AttendEase</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-layout">
    <!-- Mobile Nav (Top) -->
    <div class="auth-mobile-nav">
        <div class="brand">
            <i data-lucide="graduation-cap"></i> AttendEase
        </div>
        <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.add('open'); document.getElementById('mobileOverlay').classList.add('active');">
            <i data-lucide="menu"></i>
        </button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i data-lucide="graduation-cap"></i> AttendEase
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="attendance.html" class="sidebar-link">
                <i data-lucide="bar-chart-2"></i> Attendance
            </a>
            <a href="timetable.html" class="sidebar-link">
                <i data-lucide="calendar"></i> Timetable
            </a>
            <a href="prediction.html" class="sidebar-link">
                <i data-lucide="trending-up"></i> Prediction
            </a>
            <a href="profile.html" class="sidebar-link">
                <i data-lucide="user"></i> Profile
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="sidebar-link" style="width:100%; border:none; background:transparent; cursor:pointer; font-family:inherit;" onclick="localStorage.clear(); window.location.href='login.html';">
                <i data-lucide="log-out"></i> Logout
            </button>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay" onclick="document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('active');"></div>

    <!-- Main Content -->
    <div class="main-content">
        <main class="login-container" style="align-items:flex-start; padding-top:64px;">

            <div class="password-card login-card" style="max-width:450px; margin: 0 auto;">

                <div class="brand-logo"><i data-lucide="lock" style="width:48px;height:48px;"></i></div>

                <h2>Change Password</h2>

                <form id="passwordForm">

                    <!-- Verification Code -->
                    <div class="field-group">
                        <label for="verificationCode">
                            Verification Code
                        </label>
                        <input
                            type="text"
                            id="verificationCode"
                            placeholder="Example: 67ECE"
                            required
                        >
                    </div>

                    <!-- New Password -->
                    <div class="field-group">
                        <label for="newPassword">
                            New Password
                        </label>
                        <input
                            type="password"
                            id="newPassword"
                            placeholder="Enter new password"
                            required
                        >
                    </div>

                    <!-- Confirm Password -->
                    <div class="field-group">
                        <label for="confirmPassword">
                            Confirm Password
                        </label>
                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm new password"
                            required
                        >
                    </div>

                    <button type="submit">
                        Update Password
                    </button>

                </form>

            </div>

        </main>
    </div>
</div>

    <script src="api.js"></script>
    <script src="changepassword.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
