<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Change Password | AttendEase</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <h2>AttendEase</h2>

        <button onclick="window.location.href='profile.html'">
            Back
        </button>

    </nav>

    <!-- Main -->

    <main class="password-page">

        <div class="password-card login-card" style="max-width:450px;margin:40px auto;">

            <h1>Change Password</h1>

            <form id="passwordForm">

                <!-- Verification Code -->

                <label for="verificationCode">
                    Verification Code
                </label>

                <input
                    type="text"
                    id="verificationCode"
                    placeholder="Example: 67ECE"
                    required
                >

                <!-- New Password -->

                <label for="newPassword">
                    New Password
                </label>

                <input
                    type="password"
                    id="newPassword"
                    placeholder="Enter new password"
                    required
                >

                <!-- Confirm Password -->

                <label for="confirmPassword">
                    Confirm Password
                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm new password"
                    required
                >

                <button type="submit">
                    Update Password
                </button>

            </form>

        </div>

    </main>

    <script src="api.js"></script>

    <script src="changepassword.js"></script>

</body>

</html>
