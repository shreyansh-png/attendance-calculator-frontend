<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | AttendEase</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">
            <i data-lucide="graduation-cap"></i> AttendEase
        </div>
        <button onclick="window.location.href='profile.html'">
            <i data-lucide="arrow-left" style="width:14px;height:14px;margin-right:4px;"></i> Back
        </button>
    </nav>

    <!-- Main -->
    <main class="login-container">

        <div class="password-card login-card" style="max-width:450px;">

            <div class="brand-logo"><i data-lucide="lock" style="width:48px;height:48px;"></i></div>

            <h2>Change Password</h2>

            <form id="passwordForm">

                <!-- Verification Code -->
                <div class="field-group">
                    <label for="verificationCode">
                        Verification Code
                    </label>
                    <input
                        type="text"
                        id="verificationCode"
                        placeholder="Example: 67ECE"
                        required
                    >
                </div>

                <!-- New Password -->
                <div class="field-group">
                    <label for="newPassword">
                        New Password
                    </label>
                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter new password"
                        required
                    >
                </div>

                <!-- Confirm Password -->
                <div class="field-group">
                    <label for="confirmPassword">
                        Confirm Password
                    </label>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm new password"
                        required
                    >
                </div>

                <button type="submit">
                    Update Password
                </button>

            </form>

        </div>

    </main>

    <script src="api.js"></script>
    <script src="changepassword.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
