<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AttendEase Dashboard — Today's schedule and attendance overview.">
    <title>Dashboard | AttendEase</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="app-layout">
    <!-- Mobile Nav (Top) -->
    <div class="auth-mobile-nav">
        <div class="brand">
            <i data-lucide="graduation-cap"></i> AttendEase
        </div>
        <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.add('open'); document.getElementById('mobileOverlay').classList.add('active');">
            <i data-lucide="menu"></i>
        </button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i data-lucide="graduation-cap"></i> AttendEase
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link active">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="attendance.html" class="sidebar-link">
                <i data-lucide="bar-chart-2"></i> Attendance
            </a>
            <a href="timetable.html" class="sidebar-link">
                <i data-lucide="calendar"></i> Timetable
            </a>
            <a href="prediction.html" class="sidebar-link">
                <i data-lucide="trending-up"></i> Prediction
            </a>
            <a href="profile.html" class="sidebar-link">
                <i data-lucide="user"></i> Profile
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="sidebar-link" style="width:100%; border:none; background:transparent; cursor:pointer; font-family:inherit;">
                <i data-lucide="log-out"></i> Logout
            </button>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay" onclick="document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('active');"></div>

    <!-- Main Content -->
    <div class="main-content">
        <main class="dashboard" style="margin-top: 32px;">

            <!-- Welcome Card -->
            <section class="welcome-card">
                <div class="welcome-text">
                    <h1 id="greeting">Good Morning 👋</h1>
                    <p id="studentName" class="skeleton skeleton-line medium" style="height:20px;width:200px;"></p>
                </div>
                <div class="welcome-date">
                    <span id="currentDate"></span>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="actions-section">
                <h2><i data-lucide="zap" style="width:18px;height:18px;"></i> Quick Actions</h2>
                <div class="actions">

                    <button id="attendanceBtn" class="action-btn">
                        <div class="action-icon"><i data-lucide="bar-chart-2"></i></div>
                        <span>Attendance</span>
                    </button>

                    <button id="predictionBtn" class="action-btn">
                        <div class="action-icon"><i data-lucide="trending-up"></i></div>
                        <span>Prediction</span>
                    </button>

                    <button id="timetableBtn" class="action-btn">
                        <div class="action-icon"><i data-lucide="calendar"></i></div>
                        <span>Timetable</span>
                    </button>

                    <button id="profileBtn" class="action-btn">
                        <div class="action-icon"><i data-lucide="user"></i></div>
                        <span>Profile</span>
                    </button>

                </div>
            </section>

            <!-- Stats -->
            <section class="stats">

                <div class="stat-card" id="stat-overall">
                    <div class="stat-icon"><i data-lucide="activity"></i></div>
                    <div class="stat-body">
                        <p class="stat-label">Overall Attendance</p>
                        <h2 id="overallAttendance" class="stat-value skeleton skeleton-line short" style="height:36px;width:80px;">--</h2>
                    </div>
                </div>

                <div class="stat-card" id="stat-today">
                    <div class="stat-icon"><i data-lucide="clock"></i></div>
                    <div class="stat-body">
                        <p class="stat-label">Today's Classes</p>
                        <h2 id="todayClassCount" class="stat-value skeleton skeleton-line short" style="height:36px;width:60px;">--</h2>
                    </div>
                </div>

            </section>

            <!-- Today's Classes -->
            <section class="classes-section">

                <div class="section-header">
                    <h2><i data-lucide="list" style="width:18px;height:18px;"></i> Today's Schedule</h2>
                </div>

                <div id="todayClasses">
                    <!-- Skeleton loaders -->
                    <div class="class-card skeleton-card">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line short"></div>
                    </div>
                    <div class="class-card skeleton-card">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line short"></div>
                    </div>
                </div>

            </section>

        </main>
    </div>
</div>

    <script src="toast.js"></script>
    <script src="api.js"></script>
    <script src="dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
