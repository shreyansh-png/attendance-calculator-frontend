<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Upload Timetable</title>

    <link rel="stylesheet" href="admin.css">

</head>

<body>

<nav class="navbar">

    <h2>Upload Timetable</h2>

    <button onclick="window.location='admin-dashboard.html'">

        Dashboard

    </button>

</nav>

<main class="dashboard">

<div class="login-card">

<h2>

Upload Excel Timetable

</h2>

<form id="uploadForm">

<label for="timetable">

Choose Excel File

</label>

<input
type="file"
id="timetable"
accept=".xlsx,.xls"
required>

<button type="submit">

Upload

</button>

</form>

<p id="message"></p>

</div>

</main>

<script src="../api.js"></script>

<script src="upload-timetable.js"></script>

</body>

</html>
